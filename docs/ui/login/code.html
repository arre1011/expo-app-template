<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b8cee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "Noto Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#111418] dark:text-white font-display antialiased">
<div class="relative flex min-h-screen w-full flex-col justify-between overflow-x-hidden p-6 sm:p-8">
<!-- Header / Navigation -->
<div class="flex items-center justify-between pb-6">
<div class="flex size-12 shrink-0 items-center justify-center rounded-full bg-transparent hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer">
<span class="material-symbols-outlined text-[#111418] dark:text-white text-[24px]">arrow_back</span>
</div>
<!-- Empty div for spacing balance if needed, or remove -->
<div class="w-12"></div>
</div>
<!-- Main Content Wrapper -->
<div class="flex flex-1 flex-col justify-center max-w-[480px] mx-auto w-full">
<!-- Logo & Headlines -->
<div class="flex flex-col items-center gap-4 mb-8">
<div class="flex size-20 items-center justify-center rounded-2xl bg-primary/10 dark:bg-primary/20 text-primary mb-2">
<span class="material-symbols-outlined text-[40px]">water_drop</span>
</div>
<div class="text-center">
<h1 class="text-[#111418] dark:text-white tracking-tight text-[32px] font-extrabold leading-tight">Willkommen zurück</h1>
<p class="text-gray-500 dark:text-gray-400 text-base font-medium mt-2">Track your journey, your way.</p>
</div>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-5 w-full">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-[#111418] dark:text-gray-200 text-base font-bold leading-normal">Email</label>
<input class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-xl text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbe0e6] dark:border-gray-700 bg-white dark:bg-[#1a2632] focus:border-primary h-14 placeholder:text-[#617589] dark:placeholder:text-gray-500 p-[15px] text-base font-normal leading-normal transition-all" placeholder="Enter your email address" type="email" value=""/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="text-[#111418] dark:text-gray-200 text-base font-bold leading-normal">Password</label>
<div class="relative flex w-full items-center rounded-xl">
<input class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-xl text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbe0e6] dark:border-gray-700 bg-white dark:bg-[#1a2632] focus:border-primary h-14 placeholder:text-[#617589] dark:placeholder:text-gray-500 p-[15px] pr-12 text-base font-normal leading-normal transition-all" placeholder="Enter your password" type="password" value=""/>
<button class="absolute right-0 flex h-full w-14 items-center justify-center text-[#617589] dark:text-gray-400 hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[24px]">visibility_off</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mt-[-8px]">
<a class="text-sm font-bold text-primary hover:text-primary/80 transition-colors" href="#">
                        Passwort vergessen?
                    </a>
</div>
<!-- Login Button -->
<button class="flex w-full items-center justify-center rounded-xl bg-primary h-14 px-4 text-base font-bold leading-normal text-white shadow-sm hover:bg-blue-600 focus:outline-none focus:ring-4 focus:ring-blue-100 dark:focus:ring-blue-900 transition-all mt-2">
                    Login
                </button>
</div>
<!-- Social Login Divider -->
<div class="relative my-8 text-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-[#dbe0e6] dark:border-gray-700"></div>
</div>
<div class="relative inline-block bg-background-light dark:bg-background-dark px-4">
<span class="text-sm font-medium text-gray-500 dark:text-gray-400">Or continue with</span>
</div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex h-12 items-center justify-center gap-2 rounded-xl border border-[#dbe0e6] dark:border-gray-700 bg-white dark:bg-[#1a2632] hover:bg-gray-50 dark:hover:bg-[#203040] transition-colors">
<svg class="h-5 w-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M23.766 12.2764C23.766 11.4607 23.6999 10.6406 23.5588 9.83807H12.24V14.4591H18.7217C18.4528 15.9494 17.5885 17.2678 16.323 18.1056V21.1039H20.19C22.4608 19.0139 23.766 15.9274 23.766 12.2764Z" fill="#4285F4"></path>
<path d="M12.2401 24.0008C15.4766 24.0008 18.2059 22.9382 20.1901 21.1039L16.3231 18.1055C15.2517 18.8375 13.8627 19.252 12.2445 19.252C9.11388 19.252 6.45946 17.1399 5.50705 14.3003H1.5166V17.3912C3.55371 21.4434 7.7029 24.0008 12.2401 24.0008Z" fill="#34A853"></path>
<path d="M5.50253 14.3003C5.00236 12.8099 5.00236 11.1961 5.50253 9.70575V6.61481H1.51649C-0.18551 10.0056 -0.18551 14.0004 1.51649 17.3912L5.50253 14.3003Z" fill="#FBBC05"></path>
<path d="M12.2401 4.74966C13.9509 4.7232 15.6044 5.36697 16.8434 6.54867L20.2695 3.12262C18.1001 1.0855 15.2208 -0.034466 12.2401 0.000808666C7.7029 0.000808666 3.55371 2.55822 1.5166 6.61481L5.50264 9.70575C6.45064 6.86173 9.10947 4.74966 12.2401 4.74966Z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-bold text-[#111418] dark:text-white">Google</span>
</button>
<button class="flex h-12 items-center justify-center gap-2 rounded-xl border border-[#dbe0e6] dark:border-gray-700 bg-white dark:bg-[#1a2632] hover:bg-gray-50 dark:hover:bg-[#203040] transition-colors">
<svg class="h-5 w-5 fill-[#111418] dark:fill-white" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.684.816-1.813 1.508-2.95 1.508-.178 0-.353-.017-.53-.05.033-1.076.535-2.21 1.173-3.04C13.565 2.096 14.814 1.34 16.365 1.43zm-2.035 15.21c.82 1.2 1.765 1.56 2.65 1.56.883 0 1.94-.53 2.766-1.56.884-1.096 1.12-1.928 1.147-2.064-.03-.017-2.18-1.29-2.268-4.226-.06-3.09 2.15-4.43 2.268-4.495-.12-.05-1.47-2.313-3.966-2.313-1.647 0-2.327 1.05-3.328 1.05-1.002 0-2.12-.99-3.417-.99-2.65 0-4.8 2.28-4.8 5.61 0 3.73 2.384 8.76 5.306 8.76 1.413 0 2.21-.99 3.648-.99 1.44 0 2.09.99 3.648.99z"></path>
</svg>
<span class="text-sm font-bold text-[#111418] dark:text-white">Apple</span>
</button>
</div>
</div>
<!-- Footer / Registration -->
<div class="w-full text-center pt-8 pb-4">
<p class="text-base font-medium text-gray-500 dark:text-gray-400">
                Noch kein Konto? 
                <a class="font-bold text-primary hover:text-primary/80 transition-colors ml-1" href="#">
                    Registrieren
                </a>
</p>
</div>
</div>
</body></html>
