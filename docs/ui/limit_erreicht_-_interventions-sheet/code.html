<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Limit erreicht - Interventions-Sheet</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b8cee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#111418] dark:text-white font-display">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-hidden bg-white dark:bg-[#101922] max-w-md mx-auto shadow-xl">
<!-- BottomSheetHandle -->
<div class="flex flex-col items-center pt-4 pb-2">
<div class="h-1.5 w-12 rounded-full bg-[#dbe0e6] dark:bg-gray-700"></div>
</div>
<div class="flex-1 flex flex-col items-center justify-center px-6 pb-6">
<!-- Header Visual: Calm Icon/Illustration -->
<div class="mb-8 flex items-center justify-center">
<div class="relative flex h-32 w-32 items-center justify-center rounded-full bg-[#eef6fd] dark:bg-[#1a2c3d]">
<span class="material-symbols-outlined text-primary text-6xl">
                        flag
                    </span>
</div>
</div>
<!-- Text Content -->
<div class="text-center mb-10 space-y-3">
<h1 class="text-[#111418] dark:text-white text-[32px] font-extrabold leading-tight tracking-tight">
                    Du hast dein<br/>Ziel erreicht
                </h1>
<p class="text-[#637588] dark:text-[#93a1b0] text-lg font-normal leading-relaxed max-w-[320px] mx-auto">
                    Dein Tageslimit ist voll. Das ist ein guter Moment, um kurz durchzuatmen. Was möchtest du als Nächstes tun?
                </p>
</div>
<!-- Action Stack -->
<div class="w-full space-y-3 max-w-[340px]">
<!-- Primary Action: Water -->
<button class="flex w-full cursor-pointer items-center justify-center gap-2 overflow-hidden rounded-xl h-14 px-5 bg-primary hover:bg-primary/90 transition-colors text-white text-base font-bold leading-normal tracking-wide shadow-sm group">
<span class="material-symbols-outlined text-[20px]">water_drop</span>
<span class="truncate">Wasser zuerst</span>
</button>
<!-- Secondary Action: Pause -->
<button class="flex w-full cursor-pointer items-center justify-center gap-2 overflow-hidden rounded-xl h-14 px-5 bg-[#eef6fd] hover:bg-[#e1effb] dark:bg-[#1a2c3d] dark:hover:bg-[#233a50] text-primary dark:text-[#5fa5f3] text-base font-bold leading-normal tracking-wide transition-colors">
<span class="material-symbols-outlined text-[20px]">timer</span>
<span class="truncate">10-Min-Pause</span>
</button>
<!-- Tertiary Action: Log Anyway (Friction) -->
<div class="pt-2">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-5 bg-transparent hover:bg-gray-50 dark:hover:bg-white/5 text-[#637588] hover:text-[#111418] dark:text-[#6b7d8f] dark:hover:text-white text-sm font-medium leading-normal tracking-wide transition-colors">
<span class="truncate">Trotzdem eintragen</span>
</button>
</div>
</div>
</div>
<!-- Footer Disclaimer -->
<div class="pb-8 px-6">
<p class="text-[#93a1b0] dark:text-[#4a5f75] text-xs text-center font-medium">
                Du entscheidest – wir unterstützen dich.
            </p>
</div>
</div>
</body></html>
