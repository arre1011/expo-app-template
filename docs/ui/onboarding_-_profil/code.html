<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Profil</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b8cee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        /* Custom Range Slider Styling */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #2b8cee;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 2px 6px rgba(43, 140, 238, 0.4);
        }
        input[type=range]::-moz-range-thumb {
            height: 24px;
            width: 24px;
            border: none;
            border-radius: 50%;
            background: #2b8cee;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(43, 140, 238, 0.4);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #e5e7eb;
            border-radius: 9999px;
        }
        .dark input[type=range]::-webkit-slider-runnable-track {
            background: #374151;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-[#111418] dark:text-white antialiased h-screen overflow-hidden">
<div class="relative flex h-full w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark">
<!-- Header / Progress Steps -->
<div class="flex-none pt-8 pb-4 px-6">
<!-- Progress Indicators -->
<div class="flex w-full flex-row items-center justify-center gap-2 mb-6">
<div class="h-1.5 w-8 rounded-full bg-[#dbe0e6] dark:bg-gray-700"></div>
<div class="h-1.5 w-8 rounded-full bg-[#dbe0e6] dark:bg-gray-700"></div>
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
</div>
<!-- Headline -->
<h1 class="text-[#111418] dark:text-white tracking-tight text-[28px] font-extrabold leading-tight text-center">
                Richten wir dein Profil ein
            </h1>
<p class="text-[#637588] dark:text-gray-400 text-base font-normal leading-normal text-center mt-2 px-4">
                Diese Daten helfen uns, deine Werte genauer zu schätzen.
            </p>
</div>
<!-- Scrollable Form Content -->
<div class="flex-1 overflow-y-auto px-6 pb-32 no-scrollbar">
<div class="flex flex-col gap-6 mt-4">
<!-- Weight Input Section -->
<div class="bg-white dark:bg-[#1C2632] p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
<label class="block text-[#111418] dark:text-white text-base font-bold mb-4">Gewicht</label>
<div class="flex items-center justify-center">
<div class="relative w-full">
<input class="w-full bg-[#f6f7f8] dark:bg-[#101922] text-[#111418] dark:text-white text-center text-4xl font-extrabold p-6 rounded-xl border-none focus:ring-2 focus:ring-primary/50 outline-none transition-all placeholder-[#9aa6b2]" placeholder="0" type="number" value="75"/>
<span class="absolute right-8 top-1/2 -translate-y-1/2 text-lg font-bold text-[#637588] dark:text-gray-500">kg</span>
</div>
</div>
</div>
<!-- Biological Profile Section -->
<div>
<div class="flex items-center gap-2 mb-3 px-1">
<h2 class="text-[#111418] dark:text-white text-lg font-bold tracking-tight">Biologisches Profil</h2>
<span class="material-symbols-outlined text-[#9aa6b2] text-[20px] cursor-help" title="Faktor für Körperwasseranteil">info</span>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Option: Female -->
<button class="group relative flex flex-col items-center justify-center gap-3 p-5 rounded-2xl border-2 border-transparent bg-white dark:bg-[#1C2632] shadow-sm hover:border-primary/30 transition-all">
<div class="w-14 h-14 rounded-full bg-[#f0f2f4] dark:bg-gray-700 flex items-center justify-center text-[#637588] dark:text-gray-300 group-hover:text-primary group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[28px]">female</span>
</div>
<span class="text-base font-semibold text-[#111418] dark:text-white">Weiblich</span>
</button>
<!-- Option: Male (Selected State) -->
<button class="relative flex flex-col items-center justify-center gap-3 p-5 rounded-2xl border-2 border-primary bg-primary/5 dark:bg-primary/10 shadow-sm transition-all">
<div class="absolute top-3 right-3 text-primary animate-in zoom-in duration-200">
<span class="material-symbols-outlined text-[22px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="w-14 h-14 rounded-full bg-primary text-white flex items-center justify-center shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-[28px]">male</span>
</div>
<span class="text-base font-bold text-primary">Männlich</span>
</button>
</div>
</div>
<!-- Metabolism Slider Section -->
<div class="bg-white dark:bg-[#1C2632] p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
<div class="flex justify-between items-center mb-6">
<label class="text-[#111418] dark:text-white text-base font-bold">Abbau-Rate</label>
<span class="text-xs font-medium text-[#637588] uppercase tracking-wider bg-[#f0f2f4] dark:bg-gray-700 px-2 py-1 rounded">Optional</span>
</div>
<div class="relative px-2">
<input class="w-full appearance-none h-1.5 bg-gray-200 rounded-lg outline-none slider-thumb" max="3" min="1" step="1" type="range" value="2"/>
<div class="flex justify-between text-sm font-semibold text-[#637588] dark:text-gray-400 mt-4">
<span class="text-left w-20">Langsam</span>
<span class="text-center w-20 text-primary dark:text-white">Standard</span>
<span class="text-right w-20">Schnell</span>
</div>
</div>
</div>
<!-- Disclaimer Box -->
<div class="p-4 rounded-xl bg-orange-50 dark:bg-orange-900/10 border border-orange-100 dark:border-orange-900/30 flex gap-3 items-start">
<span class="material-symbols-outlined text-orange-600 dark:text-orange-400 shrink-0 mt-0.5" style="font-variation-settings: 'FILL' 1;">warning</span>
<p class="text-sm font-medium text-orange-800 dark:text-orange-200 leading-relaxed">
                        Wichtiger Hinweis: Alle Berechnungen sind nur Schätzungen. Bitte verlasse dich nicht darauf, um deine Fahrtüchtigkeit zu beurteilen.
                    </p>
</div>
</div>
</div>
<!-- Sticky Footer CTA -->
<div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark pt-16 z-10">
<button class="w-full h-14 bg-primary hover:bg-[#257BCF] text-white rounded-xl text-lg font-bold shadow-lg shadow-primary/25 transition-all active:scale-[0.98] flex items-center justify-center gap-2 group">
                Starten
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
</body></html>
