<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b8cee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",

                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]

                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },

<style>
    body {

<main class="flex-1 flex flex-col items-center justify-center px-6 pb-20">
<div class="flex flex-col items-center gap-8 w-full max-w-sm">

<div class="relative w-48 h-48 flex items-center justify-center">
<div class="absolute inset-0 bg-blue-100/50 dark:bg-blue-900/20 rounded-full blur-2xl transform scale-110"></div>
<div class="relative bg-center bg-no-repeat bg-contain w-full h-full rounded-full overflow-hidden" data-alt="abstract calm blue gradient circle with soft flowing lines representing mindfulness" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCjZR18ixRrrtXOZnPpvaPeQp89YCeWcWkc_81ce9GKUFYUJkCXJeT2UMGvYR_Fmzn1clLstjidzdJwSC_RrL75inFBh72zuOyyj5JKf09eZKjf3RB38XgqgoGfmur55MXUiVpRkAgFmM3KakVpQ4EvxDRSgBEjuoy9gjJ4boLXsrZEpTccMPBgb7MrmWGb22dU8OJmWgrAXquDE0WkWNws1mrDDm9DjpVZ1EVZnW5tLkbGNwwJ4FfavgFopTF4clmEfqcmybijvVVV");'>
</div>
</div>

<div class="flex flex-col items-center gap-3 text-center">
<h2 class="text-[#111418] dark:text-white text-2xl font-bold leading-tight tracking-tight">Ready for the day?</h2>
<p class="text-gray-500 dark:text-gray-400 text-base font-normal leading-relaxed max-w-[280px]">
                        Tracking helps you stay mindful. Tap below to add your first drink or check-in.
                    </p>
</div>
<!-- Primary Action Button -->
<button class="group relative w-full flex items-center justify-center gap-3 bg-primary hover:bg-blue-600 active:scale-[0.98] transition-all duration-200 text-white h-14 rounded-xl shadow-lg shadow-blue-500/20">
<span class="material-symbols-outlined text-[24px]">add_circle</span>
<span class="text-base font-bold tracking-wide">Log Drink</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white dark:bg-[#1a2632] border-t border-[#f0f2f4] dark:border-gray-800 px-6 pb-6 pt-3">

<!-- Today (Active) -->
<a class="flex flex-col items-center gap-1 min-w-[64px] group" href="#">
<div class="flex h-8 items-center justify-center transition-colors text-primary">
