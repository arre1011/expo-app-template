# Setup Profile Utility Flow
# Creates a user profile if onboarding screen is shown
# This flow is idempotent - it only runs setup if needed

appId: com.drinktracking.app
---
# Check if we're on onboarding screen
- runFlow:
    when:
      visible: "Your Profile"
    commands:
      # Enter weight
      - tapOn:
          text: "75"
          optional: true
      - tapOn:
          id: "weight-input"
          optional: true
      - inputText: "75"

      # Select biological profile
      - tapOn: "Female"

      # Wait for "Ready to start!" to appear
      - assertVisible:
          text: "Ready to start!"
          optional: true

      # Continue through value screens if present
      - tapOn:
          text: "Get Started"
          optional: true
      - tapOn:
          text: "Continue"
          optional: true
      - tapOn:
          text: "Continue"
          optional: true
      - tapOn:
          text: "Continue"
          optional: true

      # Submit profile
      - tapOn:
          text: "Continue"
          optional: true
      - tapOn:
          text: "Start"
          optional: true

      # Skip paywall if present
      - tapOn:
          text: "Restore Purchases"
          optional: true
