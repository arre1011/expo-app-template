# E2E Test: Add Preset Drink
# Test-ID: DRK-001
#
# Ziel: Verifizieren, dass ein Preset-Getraenk erfolgreich hinzugefuegt wird
#       und der BAC aktualisiert wird.

appId: com.drinktracking.app
tags:
  - p0
  - drinks
  - smoke
---
# App starten mit frischem Zustand
- launchApp:
    clearState: true

# === EXPO DEV CLIENT HANDLING ===
# Bei Development Builds erscheint zuerst der Dev Client Launcher
- extendedWaitUntil:
    visible: "Development Build"
    timeout: 10000

# Auf den Development Server tippen um die App zu starten
- tapOn:
    text: "http://10.0.2.2:8081"

# Developer Menu Modal erscheint beim ersten Start - "Continue" antippen
- extendedWaitUntil:
    visible: "Continue"
    timeout: 15000

- tapOn:
    text: "Continue"

# Developer Tools Menu oeffnet sich - X Button antippen um zu schliessen
- extendedWaitUntil:
    visible: "Go home"
    timeout: 10000

# Schliesse das Menu mit dem X-Button (oben rechts)
- tapOn:
    point: "90%,5%"

# Warte bis die eigentliche App (Onboarding Welcome Screen) geladen ist
- extendedWaitUntil:
    visible: "Get Started"
    timeout: 20000

# === ONBOARDING HANDLING ===
# Onboarding besteht aus: welcome -> value1 -> value2 -> value3 -> profile -> paywall

# Welcome Screen - "Get Started" Button
- tapOn: "Get Started"

# Value Screen 1, 2, 3 - jeweils "Continue" antippen
- extendedWaitUntil:
    visible: "Continue"
    timeout: 5000
- tapOn: "Continue"

- extendedWaitUntil:
    visible: "Continue"
    timeout: 5000
- tapOn: "Continue"

- extendedWaitUntil:
    visible: "Continue"
    timeout: 5000
- tapOn: "Continue"

# Warte auf Profile Screen
- extendedWaitUntil:
    visible: "Your Profile"
    timeout: 5000

# Profile Screen - Gewicht eingeben und Profil erstellen
# Tippe auf das Weight Input Feld (Placeholder "75")
- tapOn:
    text: "75"
    optional: true

# Gib Gewicht ein
- inputText: "80"

# Waehle Geschlecht
- tapOn: "Female"

# Profil absenden
- extendedWaitUntil:
    visible: "Continue"
    timeout: 3000
- tapOn: "Continue"

# Warte auf Paywall
- extendedWaitUntil:
    visible: "Restore Purchases"
    timeout: 15000

# Paywall - ueberspringen mit Restore Purchases
- tapOn: "Restore Purchases"

# Warte auf Home Screen
- extendedWaitUntil:
    visible: "Ready for today"
    timeout: 15000

# === HAUPTTEST: Drink hinzufuegen ===

# Schritt 1: Verifiziere leeren Home-Screen
- assertVisible: "Ready for today"

# Schritt 2: "Log drink" Button antippen
- tapOn: "Log drink"

# Schritt 3: Warte auf Add-Drink-Modal
- extendedWaitUntil:
    visible: "Add Drink"
    timeout: 5000

# Schritt 4: Verifiziere Presets
- assertVisible: "Small Beer"

# Schritt 5: "Small Beer" auswaehlen
- tapOn: "Small Beer"

# Schritt 6: Speichern
- tapOn: "Save"

# Schritt 7: Warte auf Home-Screen Update
- extendedWaitUntil:
    visible: "Drinks"
    timeout: 5000

# Schritt 8: Verifiziere Drink in Liste
- assertVisible: "Small Beer"

# Test erfolgreich!
